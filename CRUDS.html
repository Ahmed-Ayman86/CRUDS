<!DOCTYPE html>
<html>
<head>
<title>  CRUDS  </title>
<link rel="stylesheet"  href ="CRUDS.css"> </style>
</head>
<body>

<h1>  Create Read Update Delete Search  </h1>

<div class ="CRUDS">

   <div class="input">

     <input placeholder="title" type ="text" id="title">
     <div class ="price">
        <input onkeyup="gettotal()" placeholder="price"     type ="number"   id="price">
        <input onkeyup="gettotal()" placeholder="taxes"     type ="number"   id="taxes">
        <input onkeyup="gettotal()" placeholder="ads"       type ="number"   id="ads">
        <input onkeyup="gettotal()" placeholder="discount"  type ="number"   id="discount">
        <small id="total" ></small>
     </div>
      <input placeholder="count" type ="number"   id="count">
      <input placeholder="category" type ="text"   id="category">
      <br>
       <button id="submit" >Create</button>

   </div>


    <div class="outputs">
    <div class="Search">
        <input onkeyup="searchdata(this.value)" placeholder="search" type="text" id="search">
        <div class="btnsearch">
            <button onclick="searchmode(this.id)" id="searchtitle">search by title</button>
            <button onclick="searchmode(this.id)" id="searchcategory">search by category</button>
        </div>
    </div>
    <div id =deleteall >

    </div>     
    <table>
        <tr>
            <th> id</th>
            <th> title</th>
            <th> price</th>
            <th> taxes</th>
            <th>ads</th>
            <th> discount</th>
            <th>total</th>
            <th>count</th>
            <th> category</th>
            <th> update</th>
            <th> delete</th>
        </tr>
        <tbody id="tbody">
       
        </tbody>
    </table>


    </div>
</div>

<script src = "CRUDS.js"  > </script>

</body>
</html>
